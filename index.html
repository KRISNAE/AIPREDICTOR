  <script>
    const fallbackFlag = 'https://placehold.co/120x80/111827/ffffff?text=FLAG';

    function el(id){return document.getElementById(id)}

    function sortUpcomingMatches(list){const monthMap={januari:0,january:0,februari:1,february:1,maret:2,march:2,april:3,mei:4,may:4,juni:5,june:5,juli:6,july:6,agustus:7,august:7,september:8,oktober:9,october:9,november:10,desember:11,december:11};function parseDateTime(m){const d=String(m.date||'').toLowerCase(),t=String(m.time||'');const dm=d.match(/(\d{1,2})\s+([a-zA-ZÀ-ÿ]+)/),tm=t.match(/(\d{1,2})[:.](\d{2})/);const day=dm?Number(dm[1]):99,month=dm?(monthMap[dm[2]]??11):11,hour=tm?Number(tm[1]):23,min=tm?Number(tm[2]):59;return new Date(2026,month,day,hour,min).getTime()}return [...list].sort((a,b)=>parseDateTime(a)-parseDateTime(b))}

      } catch (err) {
        showError('Gagal konek API Web App: ' + (err && err.message ? err.message : err));
        el('upcomingList').innerHTML = '<div class="text-red-300 p-4">API belum bisa dibaca.</div>';
        el('completedList').innerHTML = '<div class="text-red-300 p-4">API belum bisa dibaca.</div>';
      }
    }
    function poisson(lambda){let L=Math.exp(-lambda),p=1,k=0;do{k++;p*=Math.random()}while(p>L);return k-1}
    function simulateMatch(t1,t2,totalSim=7000){let homeWin=0,awayWin=0,draw=0,scores={};for(let i=0;i<totalSim;i++){const h=poisson(Math.max(.45,(t1.attack/t2.defense)*1.15)),a=poisson(Math.max(.45,(t2.attack/t1.defense)*1.05));if(h>a)homeWin++;else if(a>h)awayWin++;else draw++;const key=`${h}-${a}`;scores[key]=(scores[key]||0)+1}let best='1-1',cnt=0;Object.keys(scores).forEach(s=>{if(scores[s]>cnt){best=s;cnt=scores[s]}});const [sh,sa]=best.split('-').map(Number);return{scoreHome:sh,scoreAway:sa,homeProb:Math.round(homeWin/totalSim*100),drawProb:Math.round(draw/totalSim*100),awayProb:Math.round(awayWin/totalSim*100)}}
    function showPrediction(t1,t2,sim,source){
  document.body.classList.add('predictor-open');

  el('resFlag1').src=t1.flag;
  el('resFlag2').src=t2.flag;
  el('resTeam1').textContent=t1.name.toUpperCase();
  el('resTeam2').textContent=t2.name.toUpperCase();
  el('resScore1').textContent=sim.scoreHome;
  el('resScore2').textContent=sim.scoreAway;
  el('homeProb').textContent=sim.homeProb;
  el('drawProb').textContent=sim.drawProb;
  el('awayProb').textContent=sim.awayProb;

  const conf=Math.max(sim.homeProb,sim.drawProb,sim.awayProb);
  el('confValue').textContent=conf+'%';

  const fav=sim.homeProb>sim.awayProb&&sim.homeProb>sim.drawProb?t1.name:sim.awayProb>sim.homeProb&&sim.awayProb>sim.drawProb?t2.name:'Draw';

el('analysisText').innerHTML=`Prediksi <strong>${esc(source)}</strong> untuk pertandingan <strong>${esc(t1.name)}</strong> vs <strong>${esc(t2.name)}</strong> mengarah ke skor <strong class="text-yellow-300">${esc(t1.name)} ${sim.scoreHome} - ${sim.scoreAway} ${esc(t2.name)}</strong>.<br><br>Peluang terbesar saat ini: <strong class="text-purple-300">${esc(fav)}</strong>.`;

/* Hilangkan card atas */
el('emptyState').classList.add('hidden');

/* Tampilkan hasil prediksi */
el('resultsPanel').classList.remove('hidden');
el('resultsPanel').classList.add('fade-up');

/* Scroll ke atas hasil prediksi */
el('resultsPanel').scrollIntoView({
  behavior:'smooth',
  block:'start'
});
}
    function generatePrediction(){clearError();const t1=findTeam(el('team1').value),t2=findTeam(el('team2').value);if(!t1||!t2)return showError('Nama negara belum sesuai dengan data sheet bro.');if(t1.name===t2.name)return showError('Team tidak boleh sama bro.');el('loadingOverlay').classList.remove('hidden');el('generateBtn').disabled=true;setTimeout(()=>{showPrediction(t1,t2,simulateMatch(t1,t2),'AI Simulation');el('loadingOverlay').classList.add('hidden');el('generateBtn').disabled=false},650)}
    function selectPredictorByKey(key){const m=sheetData.upcoming.find(item=>matchKey(item)===key);if(!m)return showError('Data pertandingan tidak ditemukan bro.');revealedPredictors.add(key);renderLists();clearError();el('team1').value=m.team1;el('team2').value=m.team2;updateTeamPreview();const t1=findTeam(m.team1),t2=findTeam(m.team2),score=normalizeScore(m.predictor);if(!t1||!t2)return showError('Team dari sheet belum lengkap logo/nama.');if(score){const[h,a]=score;const homeProb=h>a?62:h===a?28:18,drawProb=h===a?52:22,awayProb=a>h?62:h===a?20:18;showPrediction(t1,t2,{scoreHome:h,scoreAway:a,homeProb,drawProb,awayProb},'Sheet Predictor')}else{generatePrediction()}}
    function selectPredictor(team1,team2,predictor){const m=sheetData.upcoming.find(item=>item.team1===team1&&item.team2===team2&&item.predictor===predictor);if(m)return selectPredictorByKey(matchKey(m));generatePrediction()}
    function resetApp(){clearError();if(teamsData[0])el('team1').value=teamsData[0].name;if(teamsData[1])el('team2').value=teamsData[1].name;el('resultsPanel').classList.add('hidden');el('emptyState').classList.remove('hidden');updateTeamPreview()}
    window.addEventListener('load',loadSheetData);
  </script>
